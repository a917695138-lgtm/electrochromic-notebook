<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验记录本</title><style>
/* ===== FONTS & BASE ===== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root {
  --c-text: #1a1a1a;
  --c-muted: #666;
  --c-border: #ddd;
  --c-bg: #f8f7f4;
  --c-surface: #fff;
  --c-accent: #2563eb;
  --c-volt: #2563eb;
  --c-temp: #d97706;
  --c-conc: #059669;
  --c-warn: #dc2626;
  --c-tag: #7c3aed;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  --font-text: "Noto Serif SC", Georgia, "Times New Roman", serif;
  --radius: 6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-ui);background:var(--c-bg);color:var(--c-text);line-height:1.6}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--c-surface);border-bottom:1px solid var(--c-border);position:sticky;top:0;z-index:30}
.topbar h1{font-size:15px;font-weight:700;letter-spacing:-0.01em}
.topbar .spacer{flex:1}
.topbar .stats{display:flex;gap:16px;font-size:11px;color:var(--c-muted)}
.topbar .stats span{white-space:nowrap}
.topbar .stats b{color:var(--c-text);font-weight:600}
.btn{padding:5px 14px;border:1px solid #d0d0d0;border-radius:var(--radius);background:var(--c-surface);font-size:12px;cursor:pointer;color:#333;white-space:nowrap;font-family:var(--font-ui);transition:all .15s}
.btn:hover{background:#f0f0f0;border-color:#bbb}
.btn.primary{background:var(--c-accent);color:#fff;border-color:var(--c-accent)}
.btn.primary:hover{background:#1d4ed8}
.btn.danger{color:var(--c-warn);border-color:#fca5a5}
.btn.danger:hover{background:#fef2f2}
.btn.ghost{border-color:transparent;background:transparent;color:var(--c-muted)}
.btn.ghost:hover{background:#f0f0f0;color:var(--c-text)}

/* ===== FILTER BAR ===== */
.filters{display:flex;gap:8px;padding:8px 24px;background:var(--c-surface);border-bottom:1px solid var(--c-border);align-items:center;flex-shrink:0;flex-wrap:wrap}
.filters select,.filters input{padding:5px 10px;border:1px solid #d0d0d0;border-radius:var(--radius);font-size:12px;outline:none;background:var(--c-surface);font-family:var(--font-ui)}
.filters input.search{flex:1;min-width:160px;max-width:320px}
.filters .cnt{font-size:11px;color:var(--c-muted);margin-left:auto}

/* ===== MAIN CONTENT AREA ===== */
.main-area{flex:1;overflow-y:auto;padding:0 24px 24px}
.main-area.list{padding:12px 24px 24px}
.main-area.read,.main-area.edit{padding:16px 24px 24px}

/* ===== LIST VIEW ===== */
.month-group{margin-bottom:8px}
.month-header{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--c-muted);cursor:pointer;user-select:none;border-radius:var(--radius);margin:4px 0;white-space:nowrap}
.month-header:hover{background:#f0f0f0}
.month-header .chevron{font-size:10px;transition:transform .2s;display:inline-block;width:14px}
.month-header.collapsed .chevron{transform:rotate(-90deg)}
.month-header .count{font-size:11px;font-weight:400;color:#999}

.record-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px}
.record-table thead th{text-align:left;padding:8px 14px;background:#fafafa;border-bottom:1px solid var(--c-border);font-weight:600;color:var(--c-muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:52px;z-index:5}
.record-table tbody td{padding:8px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap}
.record-table tbody tr{cursor:pointer;transition:background .1s}
.record-table tbody tr:hover{background:#f5f7ff}
.record-table .col-date{width:90px;color:var(--c-muted);font-size:12px;white-space:nowrap}
.record-table .col-type{width:60px;white-space:nowrap}
.record-table .col-proj{width:80px;font-size:12px;white-space:nowrap}
.record-table .col-title{font-weight:500}
.record-table .col-status{width:70px;white-space:nowrap}
.record-table .col-tags{max-width:200px}
.record-table .col-expand{width:30px;text-align:center;color:#ccc;font-size:14px}

.type-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.type-dot.experiment{background:#2563eb}
.type-dot.plan{background:#0891b2}
.type-dot.method{background:#7c3aed}
.type-dot.note{background:#059669}
.type-dot.data{background:#d97706}
.type-dot.reminder{background:#dc2626}

.tag-pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;margin:1px 2px;background:#f0ebff;color:var(--c-tag);white-space:nowrap}
.status-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;white-space:nowrap;display:inline-block}

.inline-preview{display:none;padding:10px 14px 14px;background:#fafbff;border-bottom:1px solid #e5e7ff;font-family:var(--font-text);font-size:13px;line-height:1.8;max-height:240px;overflow-y:auto}
.inline-preview.show{display:block}
.inline-preview .ip-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #eee}
.inline-preview .ip-field{font-size:11px;color:var(--c-muted);white-space:nowrap}
.inline-preview .ip-field b{color:var(--c-text);font-weight:600}

.empty-state{text-align:center;padding:60px 20px;color:#999;font-family:var(--font-text)}

/* ===== READ VIEW ===== */
.read-container{max-width:780px;margin:0 auto;background:var(--c-surface);border-radius:8px;border:1px solid var(--c-border);overflow:hidden}
.read-top{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--c-border)}
.read-top h2{font-size:16px;font-weight:700;font-family:var(--font-text);flex:1}
.read-top .read-meta{font-size:11px;color:var(--c-muted)}
.read-body{font-family:var(--font-text)}
.read-fm{display:flex;flex-wrap:wrap;gap:6px 20px;padding:12px 20px;background:#fafafa;border-bottom:1px solid var(--c-border);font-size:12px}
.read-fm .fm-item{display:flex;gap:4px;align-items:baseline;white-space:nowrap}
.read-fm .fm-key{color:var(--c-muted);white-space:nowrap}
.read-fm .fm-val{font-weight:500}
.read-fm .fm-tags{display:flex;gap:3px;flex-wrap:wrap}
.read-content{padding:20px 24px;font-size:14px;line-height:1.9}
.read-content h1{font-size:18px;font-weight:700;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid #eee}
.read-content h2{font-size:15px;font-weight:700;margin:14px 0 8px;color:#333}
.read-content h3{font-size:13px;font-weight:700;margin:10px 0 6px;color:var(--c-muted)}
.read-content p{margin:6px 0}
.read-content ul,.read-content ol{margin:4px 0;padding-left:22px}
.read-content li{margin:2px 0}
.read-content code{font-family:"Cascadia Code",Consolas,monospace;font-size:12px;background:#f5f5f5;padding:1px 5px;border-radius:3px}
.read-content pre{background:#f5f5f5;padding:12px 16px;border-radius:var(--radius);overflow-x:auto;font-size:12px;line-height:1.5;margin:8px 0;border:1px solid #e5e5e5}
.read-content pre code{background:none;padding:0}
.read-content strong{font-weight:700}
.read-content em{font-style:italic}
/* Three-line academic tables */
.read-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px;font-family:var(--font-ui)}
.read-content table thead{border-top:2px solid #333;border-bottom:1px solid #333}
.read-content table thead th{padding:6px 10px;text-align:left;font-weight:600;font-size:11px;color:#333;background:none}
.read-content table tbody{border-bottom:2px solid #333}
.read-content table tbody td{padding:6px 10px;border:none;vertical-align:top}
.read-content table tbody tr:nth-child(even){background:#fafafa}
/* Highlight patterns */
.hl-volt{color:var(--c-volt);font-weight:600}
.hl-temp{color:var(--c-temp);font-weight:600}
.hl-conc{color:var(--c-conc);font-weight:600}
.hl-warn{border-left:3px solid var(--c-warn);padding-left:10px;background:#fef5f5;margin:6px 0;display:block}
.read-content .sep{text-align:center;color:#ccc;margin:16px 0;letter-spacing:4px}

.read-bottom{padding:14px 20px;border-top:1px solid var(--c-border);display:flex;gap:8px}

/* ===== EDIT VIEW ===== */
.edit-container{max-width:900px;margin:0 auto}
.edit-panel{background:var(--c-surface);border-radius:8px;border:1px solid var(--c-border);overflow:hidden}
.edit-panel-header{padding:10px 20px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;border-bottom:1px solid transparent}
.edit-panel-header:hover{background:#fafafa}
.edit-panel-header .chevron{font-size:10px;transition:transform .2s;color:var(--c-muted)}
.edit-panel.collapsed .edit-panel-header{border-bottom-color:var(--c-border)}
.edit-panel.collapsed .edit-panel-header .chevron{transform:rotate(-90deg)}
.edit-panel.collapsed .edit-panel-body{display:none}
.edit-panel-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px 16px;padding:14px 20px;background:#fafafa}
.edit-panel-body label{font-size:11px;font-weight:600;color:var(--c-muted)}
.edit-panel-body input,.edit-panel-body select{width:100%;padding:6px 8px;border:1px solid #d0d0d0;border-radius:4px;font-size:12px;outline:none;font-family:var(--font-ui);margin-top:2px}
.edit-panel-body input:focus,.edit-panel-body select:focus{border-color:var(--c-accent)}

.edit-body-area{margin-top:12px;background:var(--c-surface);border-radius:8px;border:1px solid var(--c-border);overflow:hidden}
.edit-tabs{display:flex;border-bottom:1px solid var(--c-border);background:#fafafa}
.edit-tabs .tab{padding:8px 16px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--c-muted);font-weight:500}
.edit-tabs .tab.active{border-bottom-color:var(--c-accent);color:var(--c-accent)}
.edit-textarea{width:100%;min-height:400px;padding:16px;font-size:13px;font-family:"Cascadia Code",Consolas,monospace;border:none;outline:none;resize:vertical;line-height:1.7;tab-size:2}
.preview-pane{min-height:400px;padding:20px 24px;font-family:var(--font-text);font-size:14px;line-height:1.9;display:none;overflow-y:auto;max-height:600px}

.edit-actions{position:sticky;bottom:0;display:flex;gap:8px;padding:12px 20px;background:var(--c-surface);border-top:1px solid var(--c-border);margin-top:12px;border-radius:0 0 8px 8px;z-index:10;align-items:center}
.edit-actions .status-msg{font-size:12px;color:#059669;margin-left:10px}
.edit-actions .dirty-tag{font-size:11px;color:#d97706;margin-left:8px;display:none}

/* ===== MODALS & TOAST ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--c-surface);border-radius:8px;padding:20px;min-width:300px;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.modal h3{font-size:14px;margin-bottom:12px;font-family:var(--font-text)}
.modal input{width:100%;padding:7px 10px;border:1px solid #d0d0d0;border-radius:5px;font-size:13px;margin-bottom:10px;font-family:var(--font-ui)}
.modal .modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal .type-options{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.modal .type-options .btn{text-align:left}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 20px;background:#333;color:#fff;border-radius:6px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;font-family:var(--font-ui)}
.toast.show{opacity:1}
</style>
</head>
<body>
<!-- ====== PASSWORD GATE ====== -->
<style>
.pw-gate{position:fixed;inset:0;z-index:999;background:#f8f7f4;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:var(--font-ui)}
.pw-gate h2{font-size:18px;font-weight:700;color:#1a1a1a;font-family:var(--font-text)}
.pw-gate input{padding:8px 14px;border:1px solid #d0d0d0;border-radius:6px;font-size:14px;outline:none;text-align:center;width:200px}
.pw-gate input:focus{border-color:#2563eb}
.pw-gate .pw-msg{font-size:12px;color:#dc2626;display:none}
.pw-locked{display:none!important}
</style>
<div class="pw-gate" id="pwGate">
<h2>实验记录本</h2>
<input type="password" id="pwInput" placeholder="请输入密码" autofocus>
<div class="pw-msg" id="pwMsg">密码错误</div>
</div>

<!-- ====== LIST VIEW ====== -->
<div id="listView">
  <div class="topbar">
    <h1>实验记录本</h1>
    <span class="spacer"></span>
    <div class="stats">
      <span>总计 <b id="statTotal">0</b></span>
      <span>实验 <b id="statExp">0</b></span>
      <span>方案 <b id="statPlan">0</b></span>
      <span>方法 <b id="statMet">0</b></span>
      <span>本月 <b id="statMonth">0</b></span>
    </div>
    <button class="btn ghost" onclick="doExportAll()">导出</button>
    <button class="btn ghost" onclick="doImport()">导入</button>
    <button class="btn primary" onclick="showNewMenu()">+ 新建</button>
  </div>
  <div class="filters">
    <select id="fType" onchange="filter()"><option value="">全部类型</option></select>
    <select id="fProj" onchange="filter()"><option value="">全部项目</option></select>
    <select id="fStat" onchange="filter()"><option value="">全部状态</option></select>
    <input class="search" id="fQ" oninput="filter()" placeholder="全文搜索（标题 · 标签 · 正文）...">
    <span class="cnt" id="filterCount"></span>
  </div>
  <div class="main-area list" id="listContent"></div>
</div>

<!-- ====== READ VIEW ====== -->
<div id="readView" style="display:none">
  <div class="topbar">
    <button class="btn ghost" onclick="goBack()">← 返回列表</button>
    <span class="spacer"></span>
    <button class="btn ghost" onclick="openEditor(curIdx)">编辑</button>
    <button class="btn danger" onclick="doDelete()">删除</button>
  </div>
  <div class="main-area read" id="readContent"></div>
</div>

<!-- ====== EDIT VIEW ====== -->
<div id="editView" style="display:none">
  <div class="topbar">
    <button class="btn ghost" onclick="goBack()">← 返回列表</button>
    <h1 id="editTitle" style="font-size:15px"></h1>
    <span class="spacer"></span>
    <span class="dirty-tag" id="dirtyTag" style="color:#d97706;font-size:11px">● 未保存</span>
    <button class="btn danger" onclick="doDelete()">删除</button>
    <button class="btn primary" onclick="doSave()">保存</button>
    <span class="status-msg" id="saveStatus"></span>
  </div>
  <div class="main-area edit" id="editBody"></div>
</div>

<!-- ====== MODALS ====== -->
<div class="modal-overlay" id="modalNew">
  <div class="modal">
    <h3>新建记录</h3>
    <div class="type-options">
      <button class="btn" onclick="newRec('experiment')" style="text-align:left"><span class="type-dot experiment"></span>实验</button>
      <button class="btn" onclick="newRec('plan')" style="text-align:left"><span class="type-dot plan"></span>实验方案</button>
      <button class="btn" onclick="newRec('method')" style="text-align:left"><span class="type-dot method"></span>方法</button>
      <button class="btn" onclick="newRec('note')" style="text-align:left"><span class="type-dot note"></span>笔记</button>
      <button class="btn" onclick="newRec('data')" style="text-align:left"><span class="type-dot data"></span>数据</button>
      <button class="btn" onclick="newRec('reminder')" style="text-align:left"><span class="type-dot reminder"></span>提醒</button>
    </div>
    <div class="modal-btns"><button class="btn" onclick="closeNewMenu()">取消</button></div>
  </div>
</div>
<div class="modal-overlay" id="modalName">
  <div class="modal">
    <h3 id="modalNameTitle">文件名</h3>
    <input id="modalNameInput" placeholder="输入文件名（不含 .md）">
    <div class="modal-btns">
      <button class="btn" onclick="closeNameModal()">取消</button>
      <button class="btn primary" id="modalNameOk">确定</button>
    </div>
  </div>
</div>

[{"folder":"methods","name":"afm.md","content":"---\ntype: method\ntitle: \"AFM测试\"\ncategory: \"形貌表征\"\ntags: [AFM, 原子力显微镜, 形貌, 粗糙度]\nproject: \"电致变色\"\nmodified: \"2026-06-02\"\n---\n\n# 测试方法：AFM（原子力显微镜）\n\n## 目的\n\n表征薄膜/材料表面三维形貌、粗糙度及颗粒尺寸。\n\n## 适用范围\n\n电致变色薄膜、纳米颗粒薄膜及各类固体材料表面分析。\n\n## 仪器与设备\n\n| 仪器 | 型号 | 参数设置 |\n|------|------|----------|\n| AFM | 待确认 | 待确认 |\n\n## 操作步骤\n\n### 预约\n1. 登录分析测试中心系统进行预约。\n2. 按系统显示的测试地址前往。\n\n### 制样\n1. 薄膜样品：将薄膜沉积在平整基底（如ITO玻璃、FTO玻璃）上，样品表面需清洁无污染。\n2. 粉末样品：将少量粉末分散于无水乙醇中，超声分散后滴在新鲜解理的云母片或硅片上，自然晾干。\n3. 样品尺寸一般不超过1 cm × 1 cm，底面需平整以保证放置稳定。\n\n### 测试\n1. 选择合适的探针（接触模式用Si₃N₄探针，轻敲模式用Si探针）。\n2. 将样品固定在样品台上（可用双面胶或真空吸附）。\n3. 调节激光光斑至探针悬臂梁末端，调整四象限探测器使SUM值最大。\n4. 进针至探针接近样品表面，设置扫描参数（扫描范围、扫描速率、PID反馈等）。\n5. 选取感兴趣区域进行扫描成像。\n\n## 常用模式\n\n| 模式 | 特点 | 适用场景 |\n|------|------|----------|\n| 接触模式（Contact） | 探针与表面持续接触 | 硬质样品、原子级分辨 |\n| 轻敲模式（Tapping） | 探针间歇性接触表面 | 软质薄膜、生物样品（推荐用于电致变色薄膜） |\n| 非接触模式（Non-contact） | 探针不与表面接触 | 极软或粘性表面 |\n\n## 关键参数\n\n| 参数 | 典型范围 | 说明 |\n|------|----------|------|\n| 扫描范围 | 1 μm × 1 μm ~ 50 μm × 50 μm | 根据特征尺寸选择 |\n| 扫描速率 | 0.5 ~ 2.0 Hz | 高速可预览，低速用于高质量成像 |\n| 分辨率 | 256 × 256 或 512 × 512 | 分辨率越高成像越精细、耗时越长 |\n| Setpoint | 根据模式设定 | 轻敲模式通常为自由振幅的60%~80% |\n\n## 数据分析\n\n1. 使用Gwyddion（开源）或NanoScope Analysis软件进行图像处理。\n2. 常用分析指标：均方根粗糙度（Rq）、算术平均粗糙度（Ra）、颗粒/晶粒尺寸、截面高度分布。\n3. 对图像进行Flatten处理以去除基底倾斜和扫描线噪声。\n\n## 注意事项\n\n- 轻敲模式为电致变色薄膜首选，避免接触模式划伤表面。\n- 测试环境需减震，避免外界振动干扰成像。\n- 探针为消耗品，注意检查探针状态，磨损后及时更换。\n- 湿度较大时可能影响成像质量。\n\n## 参考标准/文献\n\n- GB/T 31227-2014 原子力显微镜测量纳米薄膜厚度的方法\n- ISO 25178 表面纹理标准\n"},{"folder":"methods","name":"bet.md","content":"---\ntype: method\ntitle: \"BET测试\"\ncategory: \"比表面积与孔结构\"\ntags: [BET, 比表面积, 孔径分布, 氮气吸附]\nproject: \"电致变色\"\nmodified: \"2026-06-02\"\n---\n\n# 测试方法：BET（比表面积与孔径分析）\n\n## 目的\n\n测定材料的比表面积、孔体积及孔径分布，评估电致变色材料的微观结构特征。\n\n## 适用范围\n\nTiO₂粉末、TiO₂@PBI复合粉末及其他多孔/纳米粉体材料的比表面积和孔结构分析。\n\n## 仪器与设备\n\n| 仪器 | 型号 | 参数设置 |\n|------|------|----------|\n| 比表面积与孔径分析仪 | 待确认 | N₂吸附-脱附，77 K |\n\n## 操作步骤\n\n### 预约\n1. 登录分析测试中心系统进行预约（与XRD同测试中心）。\n2. 按系统显示的测试地址前往。\n\n### 制样\n\n#### 纯TiO₂粉末制样\n1. 将制备薄膜所用的TiO₂浆料放入瓷舟中，于马弗炉中烧制成粉末。\n2. 烧制条件：根据浆料中有机物含量确定温度（通常450~550 ℃），保温2 h，去除有机粘结剂。\n3. 取出烧制后的样品，用玛瑙研钵研磨至均匀细粉。\n4. 将粉末装入BET样品管中，样品量约0.1~0.3 g（视比表面积大小调整）。\n5. 将样品管安装到脱气站上，在150~300 ℃下真空脱气2~6 h，去除表面吸附的水分和气体。\n6. 脱气完成后取下样品管，称重记录样品净重，待测。\n\n#### TiO₂@PBI粉末制样\n1. 按上述步骤1~4获得纯TiO₂粉末。\n2. 将研磨好的TiO₂粉末浸泡于PBI染料的无水乙醇溶液中。\n3. 室温浸泡24 h，使染料充分吸附于TiO₂表面。\n4. 取出后用无水乙醇洗涤数次，离心分离。\n5. 将固体于60~80 ℃烘箱干燥。\n6. 干燥后粉末装入BET样品管，同上述脱气步骤处理。\n\n### 测试\n1. 将装有脱气后样品的样品管安装到分析站。\n2. 将杜瓦瓶装满液氮，置于样品管下方（77 K恒温）。\n3. 设定测试程序：N₂吸附-脱附等温线，相对压力P/P₀ = 0.01~0.99。\n4. 启动测试程序，仪器自动完成吸附和脱附过程。\n5. 测试完成后保存数据。\n\n## 数据分析\n\n| 分析方法 | 用途 | 说明 |\n|----------|------|------|\n| BET多点法 | 比表面积 | 取P/P₀ = 0.05~0.30区间数据 |\n| BJH法 | 介孔孔径分布 | 使用脱附支数据 |\n| t-plot法 | 微孔体积和外表面积 | 判断微孔贡献 |\n| DFT/NLDFT法 | 全孔径分布 | 适用于微孔-介孔全范围 |\n\n## 关键参数\n\n| 参数 | 典型值 | 说明 |\n|------|--------|------|\n| 脱气温度 | 150~300 ℃ | TiO₂通常200~250 ℃，避免过高温度改变晶相 |\n| 脱气时间 | 2~6 h | 至真空度稳定 |\n| 样品量 | 0.1~0.3 g | 比表面积越大，样品量越少 |\n| 吸附质 | N₂ | 液氮温度77 K |\n| 平衡时间 | 根据样品设定 | 通常30~60 s |\n\n## 注意事项\n\n- 样品管装样前需清洁干燥，避免污染。\n- 脱气温度不宜过高，避免TiO₂晶相转变（锐钛矿→金红石）或PBI染料分解。\n- 液氮需保持充足，测试过程中及时补充。\n- TiO₂@PBI样品脱气温度应适当降低（100~150 ℃），防止染料分解。\n- 测试前确认样品管密封良好，避免漏气影响数据。\n\n## 参考标准/文献\n\n- GB/T 19587-2017 气体吸附BET法测定固体物质比表面积\n- ISO 9277:2010 气体吸附法测定比表面积\n"},{"folder":"methods","name":"cie.md","content":"---\ntype: method\ntitle: \"CIE色度测试\"\ncategory: \"光学性能\"\ntags: [CIE, 色坐标, 色度, 电致变色, 吸收光谱]\nproject: \"电致变色\"\nmodified: \"2026-06-02\"\n---\n\n# 测试方法：CIE色度坐标计算\n\n## 目的\n\n将电致变色材料不同价态（不同电压）下的吸收光谱转换为CIE 1931色度坐标，定量表征电致变色过程中的颜色变化。\n\n## 适用范围\n\n电致变色材料（WO₃、TiO₂@PBI、PBI等）在不同氧化还原态下的颜色表征。\n\n## 所需仪器与工具\n\n| 仪器/软件 | 用途 |\n|-----------|------|\n| 紫外-可见分光光度计 | 获取不同价态样品的吸收/透射光谱 |\n| www.corlortell.com | 将反射率数据转换为XYZ三刺激值 |\n| Origin | 绘制CIE 1931色度图 |\n\n## 操作步骤\n\n### 第一步：获取吸收光谱\n1. 使用紫外-可见分光光度计分别测量不同价态（施加不同电压）下样品的吸收光谱或透射光谱。\n2. 光谱范围至少覆盖380~780 nm（可见光区），步长建议1 nm或5 nm。\n3. 记录每个价态对应的波长-吸光度（或透过率）数据。\n\n### 第二步：转换为反射数据\n1. 若测量的是透射光谱T(λ)，对于不透明薄膜可近似认为反射率 R(λ) ≈ 1 − T(λ) − A(λ) 中的适用部分；或直接用吸收光谱反推光谱反射特性。\n2. 若样品可直接测量反射光谱，则直接使用反射数据。\n3. 整理成两列数据：波长(nm)、反射率R(λ)（取值0~1或0~100）。\n\n### 第三步：XYZ三刺激值转换\n1. 打开网站 www.corlortell.com（注意拼写，实际网址建议搜索确认）。\n2. 在网站中选择CIE标准色度观察者（CIE 1931 2° Standard Observer）。\n3. 选择光源类型：通常选用D65（标准日光）或A光源。\n4. 输入或粘贴反射光谱数据。\n5. 网站计算输出XYZ三刺激值。\n6. 记录每个价态对应的X、Y、Z值。\n\n### 第四步：转换为Yxy色坐标\n1. 由XYZ三刺激值计算色坐标(x, y)：\n   - x = X / (X + Y + Z)\n   - y = Y / (X + Y + Z)\n   - Y保持不变（代表亮度信息）\n2. 可在Excel或Origin中完成此计算。\n\n### 第五步：绘制色度图\n1. 打开Origin，导入各价态的(x, y)数据。\n2. 在Origin中绘制CIE 1931色度图模板（Origin内置或自行导入CIE马蹄形边界数据）。\n3. 将各价态的色坐标点标注在色度图上。\n4. 不同价态以不同颜色/符号区分，可用箭头标注颜色变化路径。\n5. 色度图选择CIE 1931标准。\n\n## CIE 1931色度图马蹄形边界数据（关键坐标点）\n\n可用以下关键波长对应的色坐标绘制马蹄形轮廓（380~780 nm）：\n- 保持Origin中已有模板即可，或从CIE官网/文献获取标准数据。\n\n## 数据分析\n\n1. 观察不同价态色坐标在马蹄形图中的位置变化，判断颜色变化范围和趋势。\n2. 计算相邻价态之间的色差 ΔE（可选）。\n3. 分析颜色变化效率——单位电荷注入引起的色坐标位移量。\n\n## 关键参数\n\n| 参数 | 建议设置 | 说明 |\n|------|----------|------|\n| 标准观察者 | CIE 1931 2° | 小视场角，适用于薄膜样品 |\n| 光源 | D65 | 模拟自然日光 |\n| 波长范围 | 380~780 nm | 可见光全波段 |\n| 波长步长 | 5 nm | 步长越细精度越高 |\n\n## 注意事项\n\n- 吸收光谱的基线需校正，避免基线漂移影响颜色计算准确性。\n- 反射率数据需归一化至0~1（或0~100 %），输入网站时注意格式要求。\n- 不同光源选择会影响XYZ值，全文应统一光源。\n- CIE 1931色度图为非均匀色空间，色坐标的几何距离不等于感知色差（如需感知均匀空间可使用CIE 1976 L*a*b*）。\n- 薄膜样品的反射光谱受基底影响，尽量使用积分球附件测量漫反射光谱。\n- 网址 www.corlortell.com 可能拼写有误，实际使用时请确认正确域名（常见工具有：ColorTell、EasyRGB等）。\n\n## 参考标准/文献\n\n- CIE 15:2004 色度学标准\n- GB/T 3977-2008 颜色的表示方法\n- GB/T 7921-2008 均匀色空间和色差公式\n"},{"folder":"methods","name":"device-fabrication.md","content":"---\ntype: method\ntitle: \"电致变色器件制备\"\ncategory: \"器件制备\"\ntags: [器件制备, FTO, TiO2, PBI, ATO, 刮涂, 旋涂, 沙林膜封装]\nproject: \"电致变色\"\nmodified: \"2026-06-09\"\n---\n\n# 方法记录：电致变色器件制备全流程\n\n## 目的\n\n完整记录基于 TiO₂/PBI 电致变色层的器件制备工艺，包括工作电极（TiO₂层）、变色层（PBI 敏化）、离子存储层（ATO）及液态电解质体系封装的全套流程。\n\n## 材料与试剂\n\n| 材料/试剂 | 规格/来源 | 用途 |\n|-----------|-----------|------|\n| FTO 导电玻璃 | — | 基底 |\n| TiO₂ 浆料 | 购买于微信：郭振奥匹莱特 | 工作电极/半导体层 |\n| PBI 染料 | 1M 溶液 | 电致变色活性层（通过羧基共价锚定于 TiO₂） |\n| ATO 溶液 | 购买于微信：辽宁宜科精工 | 离子存储层 |\n| DCM（二氯甲烷） | — | 冲洗未锚定的 PBI |\n| 沙林膜（Surlyn） | 回型裁切 | 封装间隔层 |\n| 掩模版 | 购买于微信：辽宁宜科精工 | 限定刮涂面积 |\n\n## 仪器与设备\n\n| 设备 | 用途 |\n|------|------|\n| 紫外臭氧清洗机 | FTO 表面处理 |\n| 超声清洗机 | TiO₂ 浆料分散 |\n| 刮涂工具 + 掩模版 | TiO₂ 层涂覆 |\n| 旋涂仪 | ATO 层制备 |\n| 马弗炉 | TiO₂ 层及 ATO 层热处理 |\n| 加热台 | 沙林膜热压封装 |\n\n---\n\n## 操作步骤\n\n### 第一步：FTO 基底准备\n\n1. 将 FTO 导电玻璃清洗干净（去离子水、乙醇、丙酮依次超声清洗各 15 min）。\n2. 用氮气吹干或自然晾干。\n3. 将清洗后的 FTO 置于紫外臭氧清洗机中，打臭氧处理 **20 min**，提高表面亲水性及 TiO₂ 层附着力。\n\n### 第二步：TiO₂ 层制备（工作电极）\n\n1. 将 TiO₂ 浆料（购买于微信：郭振奥匹莱特）超声分散 **30 min**，确保浆料均匀无团聚。\n2. 将掩模版（购买于微信：辽宁宜科精工）贴合于 FTO 导电面。\n3. 用刮涂法在掩模版窗口内涂覆 TiO₂ 浆料，涂层面积约为 **1 cm × 1 cm**。\n4. 刮涂完成后小心取下掩模版。\n\n**热处理程序（马弗炉）：**\n\n- 初始温度：**30 ℃**\n- 升温速率：**10 ℃/min**\n- 升温时间：**47 min**（升温至 500 ℃）\n- 目标温度：**500 ℃**\n- 保温时间：**30 min**\n- 自然冷却至室温后取出，TiO₂ 层即制备完成。\n\n### 第三步：PBI 敏化（变色层制备）\n\n1. 配制浓度为 **1M** 的 PBI 溶液。\n2. 将已制备好 TiO₂ 层的 FTO 片浸泡于 PBI 溶液中，浸泡 **24 h**。\n   - PBI 分子通过 **羧基（-COOH）共价锚定** 于 TiO₂ 表面，形成稳定的 TiO₂@PBI 复合层。\n3. 取出后用 **DCM（二氯甲烷）** 充分冲洗，去除物理吸附、未共价锚定的多余 PBI。\n4. 置于加热台上，**110 ℃ 加热 10 min**，干燥并促进锚定结合。\n5. 此时变色层即制备完成。\n\n### 第四步：ATO 离子存储层制备\n\n1. 准备一片干净的 FTO 导电玻璃。\n2. 将 ATO 溶液（购买于微信：辽宁宜科精工）提前搅拌分散均匀。\n3. 用移液枪取 **100 μL** ATO 溶液，滴于 FTO 导电面。\n4. 旋涂工艺：\n\n   | 阶段 | 转速 | 加速度 | 时间 |\n   |------|------|--------|------|\n   | 第一阶段 | 600 rpm | 3000 rpm/s | 15 s |\n   | 第二阶段 | 1600 rpm | 3000 rpm/s | 15 s |\n\n**热处理程序（马弗炉）：**\n\n- 初始温度：**30 ℃**\n- 升温速率：**5 ℃/min**\n- 升温时间：**74 min**（升温至 400 ℃）\n- 目标温度：**400 ℃**\n- 保温时间：**30 min**\n- 自然冷却至室温后取出，ATO 离子存储层即制备完成。\n\n### 第五步：液态电解质体系封装\n\n1. 将回型裁切的**沙林膜（Surlyn）** 围绕变色层放置，作为间隔层。\n2. 将 ATO 离子存储层叠放于沙林膜之上，两片 FTO 堆叠面积约为 **2 cm × 2 cm**。\n3. 液态电解质填充于沙林膜框内（变色层与 ATO 层之间）。\n4. 置于加热台上，**120 ℃** 加热使沙林膜融化，完成初步封装。\n\n---\n\n## 器件结构示意\n\n`\n┌──────────────────────────────┐\n│   FTO 玻璃（上）              │\n├──────────────────────────────┤\n│   ATO 离子存储层              │\n├──────────────────────────────┤\n│   液态电解质                  │\n├──────────────────────────────┤\n│ ← 沙林膜间隔框 →              │\n├──────────────────────────────┤\n│   PBI@TiO₂ 变色层             │\n├──────────────────────────────┤\n│   TiO₂ 层（工作电极）          │\n├──────────────────────────────┤\n│   FTO 玻璃（下）              │\n└──────────────────────────────┘\n`\n\n## 关键参数汇总\n\n| 步骤 | 参数 | 设定值 |\n|------|------|--------|\n| FTO 预处理 | 臭氧处理 | 20 min |\n| TiO₂ 涂层 | 面积 | 1 cm × 1 cm |\n| TiO₂ 煅烧 | 升温/目标/保温 | 10 ℃/min → 500 ℃, 30 min |\n| PBI 浸泡 | 浓度/时间 | 1M / 24 h |\n| PBI 后处理 | 冲洗/加热 | DCM 冲洗 + 110 ℃, 10 min |\n| ATO 旋涂 | 体积 | 100 μL/片 |\n| ATO 旋涂 | 转速 | 600 rpm (15s) → 1600 rpm (15s) |\n| ATO 旋涂 | 加速度 | 3000 rpm/s |\n| ATO 煅烧 | 升温/目标/保温 | 5 ℃/min → 400 ℃, 30 min |\n| 封装 | 堆叠面积 | ~2 cm × 2 cm |\n| 封装 | 热压温度 | 120 ℃ |\n\n## 注意事项\n\n- FTO 臭氧处理时间不宜过长（20 min 为宜），过久可能损伤导电层。\n- TiO₂ 浆料超声应充分，防止刮涂时不均匀或出现颗粒团聚。\n- 刮涂力度尽量均匀，掩模版取下时需小心避免破坏涂层边缘。\n- 马弗炉程序运行期间勿打开炉门，避免温度冲击导致薄膜开裂。\n- PBI 浸泡后的 DCM 冲洗应充分，残留的游离 PBI 可能影响电致变色性能。\n- 沙林膜封装时注意加热时间，避免过热破坏器件结构。\n---\n\n## 变体方案：打孔型器件（液态电解质注入）\n\n对于使用**液态电解质**（如LiClO₄/ACN）的器件，采用打孔FTO + 手套箱注液 + UV胶封孔方案。\n\n### 打孔FTO准备\n\n1. 在FTO导电玻璃清洗**之前**，于右侧钻两个小孔（直径约1~2 mm）\n2. 小孔用于叠层封装后在手套箱内注入液态电解质\n3. 钻孔后按标准流程清洗、臭氧处理（20 min）\n\n### 液态电解质封装流程\n\n1. 按标准流程完成变色层（TiO₂→PBI敏化→DCM冲洗→110 ℃加热）和ATO离子存储层制备\n2. 使用**60 μm**厚度的回型沙林膜（Surlyn）包围变色层\n3. 将ATO层叠放于沙林膜上，堆叠面积约2 cm×2 cm\n4. 120 ℃加热融化沙林膜，完成初步封装（此时器件通过小孔与外部连通）\n5. 将初步封装的器件转移至**手套箱**内\n6. 通过小孔注入液态电解质（如**LiClO₄的ACN溶液**）\n7. 用**3×5 mm、厚度1 mm**的玻璃片覆盖两个注液孔\n8. 在玻璃片边缘点上紫外固化胶（**TB3035b**）\n9. 紫外灯照射**5 min**初步固化玻璃片\n10. 沙林膜所封装的四周也使用紫外胶封边一圈并固化，完成最终封装\n\n### 打孔型器件注意事项\n\n- FTO钻孔需在清洗前完成，避免清洗后引入污染\n- 手套箱内注液需确保水氧含量达标\n- 紫外胶固化时注意用黑色胶带遮挡变色层区域，避免紫外光引发PBI光致变色\n- 玻璃盖片与FTO之间需确保紫外胶完全密封，防止电解质泄漏"},{"folder":"methods","name":"eds.md","content":"---\ntype: method\ntitle: \"EDS测试\"\ncategory: \"元素分析\"\ntags: [EDS, 能谱, 元素分析, SEM]\nproject: \"电致变色\"\nmodified: \"2026-06-02\"\n---\n\n# 测试方法：EDS（能量色散X射线能谱）\n\n## 目的\n\n对材料微区进行元素种类与含量分析，确认电致变色材料的元素组成及掺杂情况。\n\n## 适用范围\n\n与SEM联用，适用于电致变色薄膜、粉末等固体样品的元素定性/半定量/定量分析。可检测元素范围：Be(4) ~ U(92)。\n\n## 仪器与设备\n\n| 仪器 | 型号 | 参数设置 |\n|------|------|----------|\n| SEM-EDS联用系统 | 与SEM同型号 | 加速电压15~20 kV，工作距离8~10 mm |\n\n## 操作步骤\n\n### 预约与测试位置\n1. EDS与SEM共用同一设备，测试位置与SEM相同。\n2. 预约SEM测试时同时注明需进行EDS分析。\n\n### 制样\n1. 制样方法与SEM一致。\n2. 薄膜样品：直接粘贴在SEM样品台上，表面需导电（非导电薄膜需喷金/喷碳处理）。\n3. 粉末样品：分散于无水乙醇中，滴在硅片或导电胶上，干燥后测试。\n4. 注意：EDS分析区域表面应平整，以减少X射线吸收效应的影响。\n\n### 测试模式\n\n| 模式 | 说明 | 用途 |\n|------|------|------|\n| 点分析 | 在选定微区点进行元素分析 | 确认特定位置元素组成 |\n| 线扫描 | 沿选定直线分析元素分布 | 观察界面元素扩散/梯度 |\n| 面扫描（Mapping） | 在选定区域进行元素分布成像 | 观察元素空间分布均匀性 |\n\n### 测试步骤\n1. 在SEM中找到感兴趣区域，调整放大倍数和对焦。\n2. 将加速电压提高至15~20 kV（确保激发目标元素的特征X射线）。\n3. 调整工作距离至8~10 mm，探针电流适当增大。\n4. 切换到EDS模式，采集能谱图。\n5. 选择分析模式（点/线/面），设定采集时间（通常30~120 s）。\n6. 采集完成后进行元素定性识别和定量计算。\n\n## 数据分析\n\n1. 使用EDS配套软件（如INCA、Aztec、TEAM等）进行分析。\n2. 定性分析：识别谱图中各特征峰对应的元素。\n3. 定量分析：选择ZAF或φ(ρz)校正方法，得到各元素的质量百分比和原子百分比。\n4. Mapping数据可生成各元素的分布伪彩色图。\n\n## 关键参数\n\n| 参数 | 典型值 | 说明 |\n|------|--------|------|\n| 加速电压 | 15~20 kV | 需高于待测元素特征X射线临界激发能的1.5~2倍 |\n| 工作距离 | 8~10 mm | 保证X射线探测器最佳采集效率 |\n| 采集时间 | 30~120 s | 时间越长信噪比越好 |\n| 死时间 | 20%~40% | 最佳死时间范围 |\n| 探测深度 | ~1 μm | 信号来自样品表层 |\n\n## 注意事项\n\n- 轻元素（C、N、O等）定量误差较大，半定量参考即可。\n- 非导电样品需喷碳（优于喷金，金的特征峰可能干扰其他元素）。\n- 薄膜样品需注意基底信号干扰（如ITO玻璃的In、Sn、O信号）。\n- 元素含量低于0.1 wt%时可能无法可靠检测。\n- 谱峰重叠时需注意解卷积（如Ti Lα与N Kα部分重叠）。\n\n## 参考标准/文献\n\n- GB/T 17359-2012 电子探针和扫描电镜X射线能谱定量分析方法通则\n- ISO 22309:2011 能谱定量分析\n"},{"folder":"methods","name":"ftir.md","content":"---\ntype: method\ntitle: \"FTIR测试\"\ncategory: \"分子结构分析\"\ntags: [FTIR, 红外光谱, 官能团, 化学键]\nproject: \"电致变色\"\nmodified: \"2026-06-02\"\n---\n\n# 测试方法：FTIR（傅里叶变换红外光谱）\n\n## 目的\n\n鉴定材料中的化学键和官能团，确认电致变色材料（特别是PBI染料、TiO₂@PBI复合物）的化学结构及相互作用。\n\n## 适用范围\n\n有机染料（PBI）、无机氧化物（TiO₂）、有机-无机复合材料及各类薄膜/粉末样品的化学结构分析。\n\n## 仪器与设备\n\n| 仪器 | 型号 | 参数设置 |\n|------|------|----------|\n| 傅里叶变换红外光谱仪 | 待确认 | 波数范围4000~400 cm⁻¹，分辨率4 cm⁻¹ |\n\n## 操作步骤\n\n### 预约\n1. 登录分析测试中心系统进行预约。\n2. 按系统显示地址前往测试。\n\n### 制样\n\n#### KBr压片法（粉末样品，透射模式）\n1. 取约1~2 mg待测粉末样品，与约100~200 mg干燥KBr粉末在玛瑙研钵中混合研磨均匀。\n2. KBr需预先在烘箱中120 ℃干燥2 h以上，除去水分。\n3. 将混合粉末倒入压片模具中，在压片机上以8~10 MPa压力压制1~2 min。\n4. 取出透明或半透明薄片，装入样品架待测。\n5. 同时压制纯KBr薄片作为背景。\n\n#### ATR模式（薄膜/块体样品）\n1. 将样品直接压在ATR晶体（通常为金刚石或ZnSe）上。\n2. 旋紧压杆使样品与晶体紧密接触。\n3. 适用于薄膜、涂层及难以研磨的样品。\n\n#### 液体池法（溶液样品）\n1. 将样品溶解于合适溶剂中（常用CCl₄、CH₂Cl₂等无红外干扰溶剂）。\n2. 注入液体池中待测。\n\n### 测试\n1. 先采集背景光谱（空气或纯KBr片）。\n2. 放入样品，采集样品光谱。\n3. 测试参数：波数范围4000~400 cm⁻¹，分辨率4 cm⁻¹，扫描次数16~32次。\n4. 检查谱图信噪比，必要时增加扫描次数。\n\n## 特征吸收峰参考\n\n### TiO₂特征峰\n| 波数范围 (cm⁻¹) | 归属 |\n|------------------|------|\n| 400~800 | Ti-O-Ti伸缩振动（宽峰） |\n| 3400附近、1630附近 | 表面吸附水O-H伸缩和弯曲振动 |\n\n### PBI（苝二酰亚胺）染料特征峰\n| 波数范围 (cm⁻¹) | 归属 |\n|------------------|------|\n| 1690~1700 | 酰亚胺C=O伸缩振动 |\n| 1650~1665 | 酰亚胺C=O伸缩振动（不对称） |\n| 1590~1600 | 苝核C=C伸缩振动 |\n| 1340~1360 | C-N伸缩振动 |\n| 1240~1260 | C-O伸缩振动 |\n\n### TiO₂@PBI复合物\n- 重点观察PBI特征峰是否发生位移或强度变化，判断TiO₂与PBI之间的相互作用（如Ti-O-C键形成、氢键等）。\n- 注意C=O峰是否向低波数位移（判断Ti⁴⁺与羰基氧的配位作用）。\n\n## 关键参数\n\n| 参数 | 典型值 | 说明 |\n|------|--------|------|\n| 波数范围 | 4000~400 cm⁻¹ | 中红外区 |\n| 分辨率 | 4 cm⁻¹ | 常规分析足够，高分辨可选2 cm⁻¹ |\n| 扫描次数 | 16~32次 | 次数越多信噪比越高 |\n| 样品:KBr比例 | ~1:100 | 样品量过多导致峰饱和 |\n\n## 注意事项\n\n- KBr易吸潮，使用前务必干燥处理，研磨和压片操作尽量在红外灯下进行。\n- 样品与KBr需研磨至充分均匀，避免散射损失。\n- ATR模式下需注意晶体材料与样品的兼容性（硬质样品可能划伤晶体）。\n- 谱图中CO₂双峰（~2350 cm⁻¹）和水峰（~3400、~1630 cm⁻¹）为常见干扰，需注意与样品信号区分。\n- TiO₂在远红外区的吸收峰较强，中红外区可能信号较弱，需适当增加样品量或扫描次数。\n\n## 参考标准/文献\n\n- GB/T 6040-2019 红外光谱分析方法通则\n- ASTM E1252 红外光谱定性分析标准\n"},{"folder":"methods","name":"tem.md","content":"---\ntype: method\ntitle: \"TEM测试\"\ncategory: \"形貌表征\"\ntags: [TEM, 透射电镜, 形貌, 晶格]\nproject: \"电致变色\"\nmodified: \"2026-05-28\"\n---\n\n# 测试方法：TEM（透射电子显微镜）\n\n## 目的\n\n观察纳米材料的微观形貌、晶格条纹及选区电子衍射。\n\n## 适用范围\n\nTiO₂及其他纳米粉体/薄膜材料的微观结构分析。\n\n## 仪器与设备\n\n| 仪器 | 型号 | 参数设置 |\n|------|------|----------|\n| TEM | 待确认 | 待确认 |\n\n## 操作步骤\n\n### 预约\n1. 登录分析测试中心系统进行预约。\n2. 系统上显示测试地址，按地址前往。\n\n### 制样（以TiO₂粉末为例）\n1. 将TiO₂粉末放入瓷舟中，于马弗炉中烧制。\n2. 取出烧制后的样品，用研钵研磨至细粉。\n3. 取少量研磨后粉末，加入无水乙醇配成悬浊液。\n4. 超声分散均匀后，用滴管吸取悬浊液滴在铜网上。\n5. 自然晾干或红外灯下烘干，待测试。\n\n## 关键参数\n\n待补充（加速电压、放大倍数、模式等）。\n\n## 注意事项\n\n- 提前预约，注意系统上的测试地址。\n- 铜网滴样浓度不宜过高，避免颗粒堆叠。\n\n## 参考标准/文献\n\n待补充。\n"},{"folder":"experiments","name":"2026-06-01-tio2-prep.md","content":"---\ntype: experiment\ntitle: \"TiO₂层制备、PBI-Cl溶液配制及ATO双层制备\"\ndate: \"2026-06-01\"\ncategory: \"器件制备\"\ntags: [TiO2, PBI-Cl, ATO, 打孔FTO, 双层ATO]\nproject: \"电致变色\"\nstatus: \"completed\"\nmodified: \"2026-06-10\"\n---\n\n# TiO₂层制备、PBI-Cl溶液配制及ATO双层制备\n\n## 日期\n2026年6月1日\n\n## TiO₂层制备\n\n- 上午烧制TiO₂层若干片，分为打孔和非打孔两种FTO基底\n- **打孔FTO**：清洗前在FTO右侧打两个小孔，用于叠层后在手套箱内注入液态电解质\n- 非打孔FTO按常规流程处理\n- 烧制程序：30 ℃起始，10 ℃/min升温47 min至500 ℃，保温30 min\n\n## PBI-Cl溶液配制\n\n- 下午配制浓度为1M的PBI-Cl溶液\n- **溶质**：PBI-Cl，摩尔质量 856.35 g/mol\n- **实际称量**：6.35 mg\n- **溶剂**：DMF（N,N-二甲基甲酰胺）\n- **溶剂体积**：7.42 mL\n- 计算验证：6.35 mg ÷ 856.35 g/mol ÷ 7.42 mL ≈ 1.0 × 10⁻³ mol/L = **1M** ✓\n\n## ATO离子存储层制备（双层）\n\n- 按基础方法制备ATO层，采用**双层ATO**工艺：\n  1. 取100 μL ATO溶液，旋涂第一次（600 rpm, 15s → 1600 rpm, 15s, 3000 rpm/s）\n  2. 再用100 μL ATO溶液，旋涂第二次（同参数）\n  3. 旋涂完成后放入马弗炉烧制：30 ℃起始，5 ℃/min升温74 min至400 ℃，保温30 min\n\n## 备注\n\n- TiO₂层制备完后浸泡于PBI-Cl溶液中，进入24 h染浴"},{"folder":"experiments","name":"2026-06-02-post-dye.md","content":"---\ntype: experiment\ntitle: \"PBI染浴后处理\"\ndate: \"2026-06-02\"\ncategory: \"器件制备\"\ntags: [PBI, DCM冲洗, 后处理, 染浴]\nproject: \"电致变色\"\nstatus: \"completed\"\nmodified: \"2026-06-10\"\n---\n\n# PBI染浴后处理\n\n## 日期\n2026年6月2日\n\n## 操作\n\n- 对6月1日浸泡24 h后的TiO₂/PBI片子进行标准后处理\n- DCM（二氯甲烷）充分冲洗，去除未共价锚定的游离PBI\n- 110 ℃加热10 min，干燥并促进锚定结合\n\n## 后续\n\n- 后处理完成的片子用于6月3日的两种器件组装（打孔器件沙林膜封装 + 非打孔器件PMMA凝胶）"},{"folder":"experiments","name":"2026-06-03-pmma-gel.md","content":"---\ntype: experiment\ntitle: \"PMMA凝胶电解质器件及沙林膜封装器件测试\"\ndate: \"2026-06-03\"\ncategory: \"器件测试\"\ntags: [PMMA凝胶, LiTFSI, DMF, CV, CA, 沙林膜, UV胶, 双面胶封装]\nproject: \"电致变色\"\nstatus: \"completed\"\nmodified: \"2026-06-10\"\n---\n\n# PMMA凝胶电解质器件及沙林膜封装器件测试\n\n## 日期\n2026年6月3日\n\n## 器件一：打孔器件沙林膜封装\n\n- 对打孔FTO片子进行初步沙林膜（**60 μm**厚度）封装\n\n## 器件二：PMMA凝胶电解质器件\n\n- 使用非打孔的变色层和离子存储层片子\n- 用**100 μm**厚度的双面胶粘合两片FTO\n- 电解质：含**LiTFSI**的PMMA凝胶（溶剂DMF）\n\n## CV测试\n\n- 初始扫描范围：**0 V → -3 V**\n  - 分子可以正常还原到负二价\n  - 但**无法氧化回中性态**\n- 调整扫描范围：**0.5 V → -3 V**\n  - 可以回到中性态\n  - 负二价峰和负一价峰几乎在**0.3 V**时同时氧化消失\n\n## CA测试\n\n- 进行了CA（计时电流）测试，但**未保存光谱数据**\n\n## UV胶固化异常现象\n\n- 在制备过程中，**未加电压**时\n- 使用紫外灯照射固化封装用的UV胶（变色层用黑色胶带阻挡避光）\n- 照射一段时间后，器件呈现出**负二价的蓝色**\n- CV测试之后，蓝色消失\n- **怀疑**：凝胶电解质使变色层变色\n- 放置一夜后并未呈现蓝色\n- 但测试结束后，该器件光谱仍存在**负一价峰**\n\n## 小结\n\n- PMMA凝胶电解质器件制备简单，但电化学可逆性存在问题（还原后氧化不完全）\n- UV胶固化过程中的光致变色现象值得进一步关注\n- 负一价峰残留说明PBI未被完全氧化回中性态"},{"folder":"experiments","name":"2026-06-04-liquid-electrolyte.md","content":"---\ntype: experiment\ntitle: \"打孔液态电解质器件测试及循环稳定性\"\ndate: \"2026-06-04\"\ncategory: \"器件测试\"\ntags: [液态电解质, LiClO4, ACN, 手套箱, 打孔器件, CV, CA, 循环稳定性, UV胶]\nproject: \"电致变色\"\nstatus: \"completed\"\nmodified: \"2026-06-10\"\n---\n\n# 打孔液态电解质器件测试及循环稳定性\n\n## 日期\n2026年6月4日\n\n## 器件封装（打孔型液态电解质器件）\n\n1. 将初步沙林膜封装的打孔器件放入**手套箱**内\n2. 注入 **LiClO₄ 的 ACN（乙腈）溶液** 作为液态电解质\n3. 用 **3×5 mm、厚度1 mm** 的玻璃片覆盖两个注液孔\n4. 在玻璃片边缘点上紫外胶（**TB3035b**）\n5. 紫外灯照射 **5 min** 初步固化\n6. 沙林膜所封装的四周也使用紫外胶封边一圈并固化\n\n## CV测试\n\n- 进行了CV（循环伏安）测试\n\n## CA响应时间测试\n\n- 进行了CA（计时电流）测试以获取响应时间\n- **问题**：光谱积分时间设置导致时间间隔为**0.8 s**\n- 从前同材料器件测试的着色时间为**0.2 s**，褪色时间为**0.4 s**\n- 0.8 s间隔超过器件实际响应时间，**难以获得准确的响应时间数据**\n\n## 循环稳定性测试（对比度衰减法）\n\n- CA放大模式，-2 V → 0 V\n- 高电压、低电压时间各**3 s**\n- 测试进程：\n  - 循环至**2000次**：重新扣除光谱基底，因器件放置角度变化，对比度反而上升（非真实性能提升）\n  - 继续测试至**4000次**\n- 具体数据待补充\n\n## 小结\n\n- 液态电解质器件封装工艺改进（打孔+手套箱注液+UV胶封孔）运行正常\n- 响应时间测试需调整光谱积分时间设置\n- 循环稳定性测试中基底扣除的重复性需注意，放置角度变化会引入误差"},{"folder":"experiments","name":"2026-06-06-re-test.md","content":"---\ntype: experiment\ntitle: \"打孔液态电解质器件过夜后复测及8000次循环\"\ndate: \"2026-06-06\"\ncategory: \"器件测试\"\ntags: [液态电解质, 循环稳定性, 对比度, 响应时间, 封装改善]\nproject: \"电致变色\"\nstatus: \"completed\"\nmodified: \"2026-06-10\"\n---\n\n# 打孔液态电解质器件过夜后复测及8000次循环\n\n## 日期\n2026年6月6日（6月4日器件过夜两天后）\n\n## 器件静置稳定性\n\n- 过夜两天后重新测试6月4日的打孔液态电解质器件\n- **对比度在器件放置后并未急剧下降**\n- 对比从前使用热熔胶封装的方法，性能保持有显著提升\n- **推测原因**：封装方法的改善（手套箱注液 + UV胶封孔）有效防止了电解质泄露\n\n## 循环稳定性测试（续）\n\n- 继续CA循环测试\n- 测试至**8000次**时，对比度下降至原来的**80%以下**\n- 8000次后停止测试\n\n## 响应时间测试\n\n- 进行了循环后响应时间测试\n- 由于同样存在光谱积分时间间隔问题（0.8 s > 实际响应时间），**无法准确计算循环后的响应时间变化**\n- 需要在后续实验中调整光谱采集参数\n\n## 小结\n\n- 打孔+手套箱注液+UV胶封装工艺相比热熔胶封装，器件静置稳定性明显提升\n- 8000次循环后对比度保持率约80%\n- 响应时间测量受限于光谱积分时间设置，后续需优化（目标：时间间隔 ≤ 0.1 s）"}]
</script>

<script>
// ====== GLOBALS ======
var DB = typeof DB !== "undefined" ? DB : [];
var TYPES = {experiment:"实验",plan:"实验方案",method:"方法",note:"笔记",data:"数据",reminder:"提醒"};
var TYPE_FOLDERS = {experiment:"experiments",plan:"plans",method:"methods",note:"notes",data:"data",reminder:"reminders"};
var TYPE_CLASSES = {experiment:"experiment",plan:"plan",method:"method",note:"note",data:"data",reminder:"reminder"};
var STATUS_COLORS = {planned:"#6b7280","in-progress":"#2563eb",completed:"#16a34a",pending:"#d97706",done:"#16a34a"};
var STATUS_LABELS = {planned:"计划中","in-progress":"进行中",completed:"已完成",pending:"待处理",done:"已完成"};
var sortKey = "date", sortDesc = true;
var curIdx = -1, dirty = false;
var expandedRow = null;

// ====== INIT ======
function init() {
  // Synced files are authoritative; avoid stale browser cache hiding new records.
  if (DB.length === 0) loadEmbedded();
  try { localStorage.removeItem("labdb"); } catch(e) {}
  checkPassword();
  populateFilters();
  renderList();
  updateStats();
}

function loadEmbedded() {
  var el = document.getElementById("db-data");
  if (el) { try { DB = JSON.parse(el.textContent); } catch(e) { DB = []; } }
}

// ====== PARSING ======
function parseFM(content) {
  var m = {type:"",title:"",date:"",modified:"",tags:[],project:"",status:"",category:"",priority:"",due:"",related:[]};
  if (!content || content.substring(0,4) !== "---\n") return m;
  var end = content.indexOf("\n---\n", 4);
  if (end < 0) return m;
  var fm = content.substring(4, end);
  var lines = fm.split("\n");
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var ci = line.indexOf(":");
    if (ci < 0) continue;
    var key = line.substring(0, ci).trim();
    var val = line.substring(ci + 1).trim();
    val = val.replace(/^"(.*)"$/, "$1");
    if (key === "tags") {
      try { m.tags = JSON.parse(val); } catch(e) { m.tags = val.replace(/[\[\]]/g,"").split(",").map(function(s){return s.trim().replace(/"/g,"")}); }
    } else if (key === "related") {
      try { m.related = JSON.parse(val); } catch(e) { m.related = []; }
    } else if (m.hasOwnProperty(key)) { m[key] = val; }
  }
  return m;
}

function getBody(content) {
  if (!content || content.substring(0,4) !== "---\n") return content || "";
  var end = content.indexOf("\n---\n", 4);
  if (end < 0) return content;
  return content.substring(end + 5).trim();
}

function fmToString(meta) {
  var lines = ["---"];
  var fields = ["type","title","date","category","tags","project","status","priority","due","related","modified"];
  for (var i = 0; i < fields.length; i++) {
    var k = fields[i], v = meta[k];
    if (v === undefined || v === null || v === "") continue;
    if (k === "tags" || k === "related") { lines.push(k + ": " + JSON.stringify(v)); }
    else if (typeof v === "string" && (v.indexOf(":") >= 0 || v.indexOf("#") >= 0 || v.indexOf('"') >= 0)) { lines.push(k + ': "' + v + '"'); }
    else { lines.push(k + ": " + v); }
  }
  lines.push("---");
  return lines.join("\n");
}

// ====== FILTERS ======
function populateFilters() {
  var types = [], projects = [], statuses = [];
  for (var i = 0; i < DB.length; i++) {
    var m = parseFM(DB[i].content);
    if (types.indexOf(m.type) < 0) types.push(m.type);
    if (m.project && projects.indexOf(m.project) < 0) projects.push(m.project);
    if (m.status && statuses.indexOf(m.status) < 0) statuses.push(m.status);
  }
  types.sort(); projects.sort(); statuses.sort();
  fillSelect("fType", types, TYPES);
  fillSelect("fProj", projects);
  fillSelect("fStat", statuses, STATUS_LABELS);
}

function fillSelect(id, items, labels) {
  var sel = document.getElementById(id);
  while (sel.options.length > 1) sel.remove(1);
  for (var i = 0; i < items.length; i++) {
    var o = document.createElement("option");
    o.value = items[i];
    o.textContent = labels ? (labels[items[i]] || items[i]) : items[i];
    sel.appendChild(o);
  }
}

function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ====== SMART HIGHLIGHTING ======
function highlightData(text) {
  // Already escaped text
  text = text.replace(/(-?\d+\.?\d*\s*V)/gi, '<span class="hl-volt">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*℃)/g, '<span class="hl-temp">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*min)/gi, '<span class="hl-temp">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*h)/gi, '<span class="hl-temp">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*[μu]L)/gi, '<span class="hl-conc">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*mg)/gi, '<span class="hl-conc">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*g\/mol)/gi, '<span class="hl-conc">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*[mμn]?M\b)/g, '<span class="hl-conc">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*mL)/gi, '<span class="hl-conc">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*rpm)/gi, '<span class="hl-conc">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*rpm\/s)/gi, '<span class="hl-conc">$1</span>');
  text = text.replace(/(\d+\.?\d*\s*s\b)/gi, '<span class="hl-conc">$1</span>');
  return text;
}

// ====== MARKDOWN TO HTML ======
function renderMarkdown(md) {
  if (!md) return "";
  var html = md;
  // Code blocks first
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_,lang,code){ return '<pre><code>'+escHtml(code)+'<\/code><\/pre>'; });
  html = escHtml(html.replace(/```[\s\S]*?```/g, ''));
  // Put code blocks back - actually escHtml first, then handle code
  html = escHtml(md);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2<\/code><\/pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1<\/code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1<\/strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1<\/em>');
  html = html.replace(/^#### (.+)$/gm, '<h3>$1<\/h3>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1<\/h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1<\/h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1<\/h1>');
  // Three-line tables
  html = html.replace(/^\|(.+)\|$/gm, function(line) {
    var cells = line.slice(1,-1).split("|");
    if (cells.every(function(c){ return /^[\s\-:]+$/.test(c) && c.trim(); })) return "<!--sep-->";
    return "<tr>" + cells.map(function(c){ return "<td>"+c.trim()+"<\/td>"; }).join("") + "<\/tr>";
  });
  html = html.replace(/<tr>(<td>.*?<\/td>)<\/tr>\s*<!--sep-->\s*<tr>/g, function(_,headerRow){
    return "<thead><tr>" + headerRow.replace(/td>/g,"th>") + "<\/tr><\/thead><tbody><tr>";
  });
  html = html.replace(/<\/tr>\s*$/m, "<\/tr><\/tbody>");
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1<\/li>');
  html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2<\/li>');
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1<\/ul>');
  html = html.replace(/\n\n+/g, '<\/p><p>');
  html = '<p>' + html + '<\/p>';
  html = html.replace(/<p><\/p>/g, '');
  html = html.replace(/<p>\s*<(h[1-3]|ul|pre|table|thead)/g, '<$1');
  html = html.replace(/<\/(h[1-3]|ul|table|tbody)>(\s*<\/p>)?/g, '<\/$1>');
  // Highlight data
  html = highlightData(html);
  // Separators
  html = html.replace(/^<p>-{3,}<\/p>$/gm, '<p class="sep">&mdash;</p>');
  return html;
}

// ====== LIST VIEW ======
function renderList() {
  var container = document.getElementById("listContent");
  // Group by month
  var groups = {};
  for (var i = 0; i < DB.length; i++) {
    var m = parseFM(DB[i].content);
    var month = (m.date || "----").substring(0,7);
    if (!groups[month]) groups[month] = [];
    groups[month].push(i);
  }
  var months = Object.keys(groups).sort().reverse();
  var html = '';
  for (var mi = 0; mi < months.length; mi++) {
    var month = months[mi];
    var indices = groups[month];
    var label = month === "----" ? "未标注日期" : month.replace("-","年")+"月";
    html += '<div class="month-group">';
    html += '<div class="month-header" onclick="toggleMonth(this)"><span class="chevron">▼</span> '+label+' <span class="count">'+indices.length+' 条</span></div>';
    html += '<div class="month-body">';
    html += '<table class="record-table"><thead><tr><th>日期</th><th></th><th>项目</th><th>标题</th><th>状态</th><th>标签</th><th></th></tr></thead><tbody>';

    for (var j = 0; j < indices.length; j++) {
      var idx = indices[j];
      var d = DB[idx];
      var m = parseFM(d.content);
      var dc = TYPE_CLASSES[m.type] || "";
      var sc = STATUS_COLORS[m.status] || "#888";
      var sl = STATUS_LABELS[m.status] || m.status || "-";
      var tagsHtml = "";
      if (m.tags && m.tags.length > 0) {
        for (var t = 0; t < Math.min(m.tags.length, 5); t++) {
          tagsHtml += '<span class="tag-pill">'+escHtml(m.tags[t])+'<\/span>';
        }
      }
      html += '<tr onclick="openRead('+idx+')" data-idx="'+idx+'">';
      html += '<td class="col-date">'+escHtml((m.date||"").substring(5))+'<\/td>';
      html += '<td class="col-type"><span class="type-dot '+dc+'"><\/span>'+escHtml(TYPES[m.type]||"")+'<\/td>';
      html += '<td class="col-proj">'+escHtml(m.project||"-")+'<\/td>';
      html += '<td class="col-title">'+escHtml(m.title||d.name)+'<\/td>';
      html += '<td class="col-status"><span class="status-badge" style="background:'+sc+';color:#fff">'+escHtml(sl)+'<\/span><\/td>';
      html += '<td class="col-tags">'+(tagsHtml||'<span style="color:#ccc;font-size:10px">-<\/span>')+'<\/td>';
      html += '<td class="col-expand" onclick="event.stopPropagation();togglePreview(this,'+idx+')">▸<\/td>';
      html += '<\/tr>';
    }
    html += '<\/tbody><\/table><\/div><\/div>';
  }
  if (Object.keys(groups).length === 0) {
    html = '<div class="empty-state"><p>没有匹配的记录</p></div>';
  }
  container.innerHTML = html;
  filter();
}

function toggleMonth(el) {
  el.classList.toggle("collapsed");
  var body = el.nextElementSibling;
  body.style.display = el.classList.contains("collapsed") ? "none" : "";
}

function togglePreview(el, idx) {
  var tr = el.parentElement;
  var existing = tr.nextElementSibling;
  if (existing && existing.classList.contains("inline-preview")) {
    existing.classList.toggle("show");
    return;
  }
  var d = DB[idx];
  var m = parseFM(d.content);
  var prev = document.createElement("tr");
  prev.className = "inline-preview show";
  var td = document.createElement("td");
  td.colSpan = 7;
  var body = getBody(d.content);
  var previewText = body.substring(0, 300).replace(/\n/g, " ");
  var ipHtml = '<div class="ip-meta">';
  if (m.category) ipHtml += '<span class="ip-field">分类: <b>'+escHtml(m.category)+'<\/b><\/span>';
  if (m.priority) ipHtml += '<span class="ip-field">优先级: <b>'+escHtml(m.priority)+'<\/b><\/span>';
  if (m.date) ipHtml += '<span class="ip-field">日期: <b>'+escHtml(m.date)+'<\/b><\/span>';
  ipHtml += '<\/div>';
  ipHtml += '<div>'+renderMarkdown(previewText + (body.length > 300 ? "..." : ""))+'<\/div>';
  ipHtml += '<div style="margin-top:6px"><span style="color:var(--c-accent);cursor:pointer;font-size:11px;font-family:var(--font-ui)" onclick="openRead('+idx+')">查看全文 →<\/span><\/div>';
  td.innerHTML = ipHtml;
  prev.appendChild(td);
  tr.parentNode.insertBefore(prev, tr.nextSibling);
}

function filter() {
  var tf = document.getElementById("fType").value;
  var pf = document.getElementById("fProj").value;
  var sf = document.getElementById("fStat").value;
  var q = (document.getElementById("fQ").value || "").toLowerCase();
  var count = 0;
  var rows = document.querySelectorAll(".record-table tbody tr:not(.inline-preview)");
  for (var r = 0; r < rows.length; r++) {
    var tr = rows[r];
    var idx = parseInt(tr.getAttribute("data-idx"));
    if (isNaN(idx)) { tr.style.display = "none"; continue; }
    var d = DB[idx];
    if (!d) { tr.style.display = "none"; continue; }
    var m = parseFM(d.content);
    var body = getBody(d.content);
    var ok = true;
    if (tf && m.type !== tf) ok = false;
    if (pf && m.project !== pf) ok = false;
    if (sf && m.status !== sf) ok = false;
    if (q) {
      var searchStr = (m.title+" "+d.name+" "+(m.tags||[]).join(" ")+" "+(m.project||"")+" "+body).toLowerCase();
      if (searchStr.indexOf(q) < 0) ok = false;
    }
    tr.style.display = ok ? "" : "none";
    // Also hide adjacent inline preview
    var next = tr.nextElementSibling;
    if (next && next.classList.contains("inline-preview")) next.style.display = ok ? "" : "none";
    if (ok) count++;
  }
  // Hide empty month groups
  var groups = document.querySelectorAll(".month-group");
  for (var g = 0; g < groups.length; g++) {
    var visible = groups[g].querySelector(".record-table tbody tr:not(.inline-preview)[style*='display: none']");
    var anyVisible = groups[g].querySelector(".record-table tbody tr:not(.inline-preview):not([style*='display: none'])");
    var hasRows = groups[g].querySelector(".record-table tbody tr:not(.inline-preview)");
    if (hasRows && !anyVisible) {
      groups[g].style.display = "none";
    } else {
      groups[g].style.display = "";
    }
  }
  document.getElementById("filterCount").textContent = count + " 条";
}

function updateStats() {
  var now = new Date();
  var thisMonth = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
  var total = DB.length, expCount = 0, planCount = 0, metCount = 0, monthCount = 0;
  for (var i = 0; i < DB.length; i++) {
    var m = parseFM(DB[i].content);
    if (m.type === "experiment") expCount++;
    if (m.type === "plan") planCount++;
    if (m.type === "method") metCount++;
    if (m.date && m.date.substring(0,7) === thisMonth) monthCount++;
  }
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statExp").textContent = expCount;
  document.getElementById("statPlan").textContent = planCount;
  document.getElementById("statMet").textContent = metCount;
  document.getElementById("statMonth").textContent = monthCount;
}

// ====== EDIT VIEW ======
function openEditor(idx) {
  curIdx = idx;
  dirty = false;
  var d = DB[idx];
  var m = parseFM(d.content);
  var body = getBody(d.content);
  
  document.getElementById("listView").style.display = "none";
  document.getElementById("readView").style.display = "none";
  document.getElementById("editView").style.display = "";
  document.getElementById("editTitle").textContent = m.title || d.name;
  document.getElementById("dirtyTag").style.display = "none";
  document.getElementById("saveStatus").textContent = "";
  
  // Build edit body
  var fields = [
    {key:"type",label:"类型",type:"select",options:TYPES},
    {key:"title",label:"标题",type:"text"},
    {key:"date",label:"日期",type:"text"},
    {key:"category",label:"分类",type:"text"},
    {key:"project",label:"项目",type:"text"},
    {key:"status",label:"状态",type:"select",options:STATUS_LABELS},
    {key:"priority",label:"优先级",type:"text"},
    {key:"due",label:"截止日",type:"text"},
    {key:"tags",label:"标签（逗号分隔）",type:"text"}
  ];
  var panelBody = "";
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    var val = m[f.key] || "";
    if (f.key === "tags" && Array.isArray(val)) val = val.join(", ");
    panelBody += '<div><label>'+f.label+'<\/label>';
    if (f.type === "select") {
      panelBody += '<select id="fm_'+f.key+'" onchange="markDirty()"><option value=""><\/option>';
      for (var k in f.options) {
        if (f.options.hasOwnProperty(k)) panelBody += '<option value="'+k+'"'+(k===val?' selected':'')+'>'+f.options[k]+'<\/option>';
      }
      panelBody += '<\/select>';
    } else {
      panelBody += '<input id="fm_'+f.key+'" value="'+escHtml(String(val))+'" oninput="markDirty()">';
    }
    panelBody += '<\/div>';
  }
  
  var html = '';
  html += '<div class="edit-panel" id="metaPanel">';
  html += '<div class="edit-panel-header" onclick="document.getElementById(\'metaPanel\').classList.toggle(\'collapsed\')"><span class="chevron">▼<\/span> 元数据<\/div>';
  html += '<div class="edit-panel-body">'+panelBody+'<\/div><\/div>';
  
  html += '<div class="edit-body-area">';
  html += '<div class="edit-tabs"><div class="tab active" id="tabEdit" onclick="switchTab(0)">编辑<\/div><div class="tab" id="tabPrev" onclick="switchTab(1)">预览<\/div><\/div>';
  html += '<textarea class="edit-textarea" id="edBody" oninput="markDirty()">'+escHtml(body)+'<\/textarea>';
  html += '<div class="preview-pane" id="pvPane"><\/div><\/div>';
  
  html += '<div class="edit-actions"><span style="font-size:11px;color:var(--c-muted);font-family:var(--font-ui)">Ctrl+S 保存<\/span><\/div>';
  
  document.getElementById("editBody").innerHTML = html;
  switchTab(0);
  window.scrollTo(0,0);
  setTimeout(function(){ document.getElementById("edBody").focus(); }, 100);
}

function switchTab(n) {
  document.getElementById("tabEdit").className = "tab" + (n===0?" active":"");
  document.getElementById("tabPrev").className = "tab" + (n===1?" active":"");
  document.getElementById("edBody").style.display = n===0?"":"none";
  document.getElementById("pvPane").style.display = n===1?"":"none";
  if (n===1) document.getElementById("pvPane").innerHTML = renderMarkdown(document.getElementById("edBody").value);
}

function readMetaForm() {
  var m = {};
  var fields = ["type","title","date","category","project","status","priority","due","tags"];
  for (var i = 0; i < fields.length; i++) {
    var el = document.getElementById("fm_"+fields[i]);
    if (el) {
      var v = el.value.trim();
      if (fields[i] === "tags") { m.tags = v ? v.split(",").map(function(s){return s.trim()}).filter(Boolean) : []; }
      else { m[fields[i]] = v; }
    }
  }
  return m;
}

function doSave() {
  if (curIdx < 0) return;
  var meta = readMetaForm();
  var body = document.getElementById("edBody").value;
  meta.modified = new Date().toISOString().slice(0,10);
  if (!meta.date) meta.date = meta.modified;
  DB[curIdx].content = fmToString(meta) + "\n\n" + body;
  saveDB();
  dirty = false;
  document.getElementById("dirtyTag").style.display = "none";
  syncRecordToDisk(DB[curIdx]);
  showToast("已保存，正在同步到 GitHub Pages");
  // Return to read view
  openRead(curIdx);
}

function markDirty() {
  if (curIdx < 0) return;
  dirty = true;
  document.getElementById("dirtyTag").style.display = "inline";
}

function doDelete() {
  if (curIdx < 0) return;
  if (!confirm("确定删除「"+(parseFM(DB[curIdx].content).title||DB[curIdx].name)+"」？")) return;
  var deleted = DB[curIdx];
  DB.splice(curIdx,1);
  saveDB();
  syncDeleteFromDisk(deleted);
  goBack();
  showToast("已删除，正在同步到 GitHub Pages");
}

function goBack() {
  if (dirty && !confirm("有未保存的修改，放弃？")) return;
  curIdx = -1;
  dirty = false;
  document.getElementById("readView").style.display = "none";
  document.getElementById("editView").style.display = "none";
  document.getElementById("listView").style.display = "";
  renderList();
  updateStats();
  populateFilters();
  window.scrollTo(0,0);
}

function newRec(type) {
  closeNewMenu();

    if (name.indexOf(".md") < 0) name += ".md";
    var today = new Date().toISOString().slice(0,10);
    var title = name.replace(".md","");
    var content = "---\ntype: "+type+"\ntitle: "+title+"\ndate: "+today+"\ntags: []\nmodified: "+today+"\n---\n\n# "+(TYPES[type]||type)+"记录\n";
    DB.push({folder:folderForType(type),name:name,content:content});

// ====== EXPORT/IMPORT ======
function doExportAll() {
  for (var i = 0; i < DB.length; i++) {
    var blob = new Blob([DB[i].content],{type:"text/markdown"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = DB[i].name;
    a.click();
  }
  showToast("已导出 "+DB.length+" 个文件");
}
function doImport() {
  var inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".md"; inp.multiple = true;
  inp.onchange = function(){
    var files = Array.from(inp.files);
    var loaded = 0;
    files.forEach(function(f){
      var reader = new FileReader();
      reader.onload = function(e){
        var c = e.target.result;
        if (c.charCodeAt(0)===0xFEFF) c = c.slice(1);
        var found = -1;
        for (var j=0;j<DB.length;j++){ if(DB[j].name===f.name){found=j;break;} }
        if (found>=0) DB[found].content = c;
        else { var pm = parseFM(c); DB.push({folder:folderForType(pm.type||"method"),name:f.name,content:c}); }
        loaded++;
        if (loaded===files.length){ saveDB(); location.reload(); }
      };
      reader.readAsText(f);
    });
  };
  inp.click();
}

// ====== UTILS ======
function saveDB() { try { localStorage.setItem("labdb",JSON.stringify(DB)); } catch(e) {} }
function folderForType(type) { return TYPE_FOLDERS[type] || "notes"; }
function syncRecordToDisk(record) {
  if (!record || location.protocol === "file:") return;
  fetch("/api/save", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(record)
  }).then(function(res){
    return res.json().then(function(data){
      if (!res.ok || !data.ok) throw new Error(data.error || "同步失败");
      showToast(data.message || "已保存并推送到 GitHub Pages");
    });
  }).catch(function(err){
    showToast("同步失败：请检查服务器窗口、网络代理或 GitHub 认证");
    console.error(err);
  });
}
function syncDeleteFromDisk(record) {
  if (!record || location.protocol === "file:") return;
  fetch("/api/delete", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({folder: record.folder, name: record.name})
  }).then(function(res){
    return res.json().then(function(data){
      if (!res.ok || !data.ok) throw new Error(data.error || "同步失败");
      showToast(data.message || "已删除并推送到 GitHub Pages");
    });
  }).catch(function(err){
    showToast("同步失败：请检查服务器窗口、网络代理或 GitHub 认证");
    console.error(err);
  });
}
function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show";
  setTimeout(function(){ el.className = "toast"; },2000);
}

var PW_UNLOCKED = false;
var PW_HASH = "9b7c0087c732664dca4dda5f65f36c6ca7c3b3c0225956bc6feb0cfab6ef6879";
function checkPassword() {

async function tryUnlock() {
  var input = document.getElementById("pwInput").value;
  if (!input) return;
  var hash = await sha256(input);
  if (hash === PW_HASH) {
    PW_UNLOCKED = true;
    document.getElementById("pwGate").style.display = "none";
    document.getElementById("listView").classList.remove("pw-locked");
  } else {
    document.getElementById("pwMsg").style.display = "block";
    document.getElementById("pwInput").value = "";
    document.getElementById("pwInput").focus();
  }
}
async function sha256(msg) {
  var enc = new TextEncoder().encode(msg);
  var buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
