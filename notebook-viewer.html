<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验记录浏览器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
.header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 16px 24px; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 600; }
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; padding: 12px 24px; background: #fff; border-bottom: 1px solid #e5e5e5; align-items: center; }
.toolbar select, .toolbar input { padding: 6px 10px; border: 1px solid #d4d4d4; border-radius: 6px; font-size: 13px; background: #fff; }
.toolbar input[type="text"] { flex: 1; min-width: 200px; max-width: 400px; }
.stats { font-size: 12px; color: #888; margin-left: auto; white-space: nowrap; }
.table-wrap { margin: 16px 24px; background: #fff; border-radius: 8px; border: 1px solid #e5e5e5; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; background: #fafafa; border-bottom: 1px solid #e5e5e5; font-weight: 600; color: #555; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: #000; }
th .arrow { font-size: 10px; margin-left: 4px; }
td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
tr:hover { background: #f9faff; }
tr.expanded { background: #f0f4ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; color: #fff; }
.type-tag { font-size: 11px; color: #888; }
.title-cell { cursor: pointer; max-width: 300px; }
.title-cell:hover { color: #2563eb; }
.detail-row { display: none; }
.detail-row.show { display: table-row; }
.detail-cell { padding: 16px 24px; background: #fafbff; border-bottom: 2px solid #e5e5e5; }
.detail-content { font-size: 13px; line-height: 1.8; max-width: 900px; }
.detail-content h1,.detail-content h2,.detail-content h3 { font-size: 15px; margin: 12px 0 6px; }
.detail-content table { margin: 8px 0; }
.detail-content td,.detail-content th { padding: 4px 8px; font-size: 12px; }
.detail-content p { margin: 4px 0; }
.detail-content ul,.detail-content ol { margin: 4px 0; padding-left: 20px; }
.empty { text-align: center; padding: 60px 20px; color: #999; }
.empty p { font-size: 14px; }
.tag-pill { display: inline-block; padding: 1px 6px; border-radius: 4px; background: #eef2ff; color: #4f46e5; font-size: 11px; margin: 1px 2px; }
.no-tags { color: #ccc; font-size: 11px; }
.clickable { cursor: pointer; color: #2563eb; font-size: 11px; }
.clickable:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="header"><h1>实验记录浏览器</h1></div>
<div class="toolbar">
  <select id="filterType"><option value="">全部类型</option></select>
  <select id="filterProject"><option value="">全部项目</option></select>
  <select id="filterStatus"><option value="">全部状态</option></select>
  <input type="text" id="searchInput" placeholder="搜索标题、标签、正文...">
  <span class="stats" id="stats"></span>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-sort="date">日期 <span class="arrow"></span></th>
        <th data-sort="type">类型 <span class="arrow"></span></th>
        <th data-sort="project">项目 <span class="arrow"></span></th>
        <th data-sort="title">标题 <span class="arrow"></span></th>
        <th data-sort="status">状态 <span class="arrow"></span></th>
        <th>标签</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty"><p>暂无记录。在对话中说"帮我记录一个实验"开始录入。</p></div>
</div>

<script>
const RECORDS = [{"path": "methods/afm.md", "dir": "methods", "type": "method", "title": "afm", "date": "", "modified": "", "tags": [], "project": "", "status": "", "category": "", "priority": "", "due": "", "related": [], "body": "﻿---\ntype: method\ntitle: \"AFM测试\"\ncategory: \"形貌表征\"\ntags: [AFM, 原子力显微镜, 形貌]\nmodified: \"2026-05-28\"\n---\n\n# 测试方法：AFM（原子力显微镜）\n\n## 目的\n\n表征薄膜/材料表面形貌与粗糙度。\n\n## 适用范围\n\n电致变色薄膜及纳米材料表面分析。\n\n## 仪器与设备\n\n| 仪器 | 型号 | 参数设置 |\n|------|------|----------|\n| AFM | 待确认 | 待确认 |\n\n## 操作步骤\n\n1. 联系谢雨宏师姐学习AFM操作流程。\n2. 待学习后补充详细步骤。\n\n## 关键参数\n\n待学习后补充（扫描范围、模式、探针类型等）。\n\n## 注意事项\n\n- 需先经过培训方可独立操作。\n\n## 参考标准/文献\n\n待补充。\n"}, {"path": "methods/tem.md", "dir": "methods", "type": "method", "title": "tem", "date": "", "modified": "", "tags": [], "project": "", "status": "", "category": "", "priority": "", "due": "", "related": [], "body": "﻿---\ntype: method\ntitle: \"TEM测试\"\ncategory: \"形貌表征\"\ntags: [TEM, 透射电镜, 形貌, 晶格]\nmodified: \"2026-05-28\"\n---\n\n# 测试方法：TEM（透射电子显微镜）\n\n## 目的\n\n观察纳米材料的微观形貌、晶格条纹及选区电子衍射。\n\n## 适用范围\n\nTiO₂及其他纳米粉体/薄膜材料的微观结构分析。\n\n## 仪器与设备\n\n| 仪器 | 型号 | 参数设置 |\n|------|------|----------|\n| TEM | 待确认 | 待确认 |\n\n## 操作步骤\n\n### 预约\n1. 登录分析测试中心系统进行预约。\n2. 系统上显示测试地址，按地址前往。\n\n### 制样（以TiO₂粉末为例）\n1. 将TiO₂粉末放入瓷舟中，于马弗炉中烧制。\n2. 取出烧制后的样品，用研钵研磨至细粉。\n3. 取少量研磨后粉末，加入无水乙醇配成悬浊液。\n4. 超声分散均匀后，用滴管吸取悬浊液滴在铜网上。\n5. 自然晾干或红外灯下烘干，待测试。\n\n## 关键参数\n\n待补充（加速电压、放大倍数、模式等）。\n\n## 注意事项\n\n- 提前预约，注意系统上的测试地址。\n- 铜网滴样浓度不宜过高，避免颗粒堆叠。\n\n## 参考标准/文献\n\n待补充。\n"}];
const TYPE_LABELS = {"experiment": "实验", "method": "方法", "note": "笔记", "data": "数据", "reminder": "提醒"};
const STATUS_COLORS = {"planned": "#6b7280", "in-progress": "#2563eb", "completed": "#16a34a", "pending": "#d97706", "done": "#16a34a"};

let sortKey = "date";
let sortDesc = true;
let expandedPath = null;

function populateFilters() {
  const types = [...new Set(RECORDS.map(r => r.type))].sort();
  const projects = [...new Set(RECORDS.map(r => r.project).filter(Boolean))].sort();
  const statuses = [...new Set(RECORDS.map(r => r.status).filter(Boolean))].sort();
  const tSel = document.getElementById("filterType");
  const pSel = document.getElementById("filterProject");
  const sSel = document.getElementById("filterStatus");
  types.forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = TYPE_LABELS[t] || t; tSel.appendChild(o); });
  projects.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; pSel.appendChild(o); });
  statuses.forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = s; sSel.appendChild(o); });
}

function statusBadge(status) {
  if (!status) return "";
  const color = STATUS_COLORS[status] || "#888";
  return `<span class="badge" style="background:${color}">${status}</span>`;
}

function tagPills(tags) {
  if (!tags || !tags.length) return '<span class="no-tags">—</span>';
  return tags.map(t => `<span class="tag-pill">${t}</span>`).join("");
}

function render() {
  const typeFilter = document.getElementById("filterType").value;
  const projectFilter = document.getElementById("filterProject").value;
  const statusFilter = document.getElementById("filterStatus").value;
  const search = document.getElementById("searchInput").value.toLowerCase();

  let filtered = RECORDS.filter(r => {
    if (typeFilter && r.type !== typeFilter) return false;
    if (projectFilter && r.project !== projectFilter) return false;
    if (statusFilter && r.status !== statusFilter) return false;
    if (search) {
      const haystack = [r.title, r.path, r.body, ...(r.tags||[]), r.project, r.status].join(" ").toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  filtered.sort((a,b) => {
    let va = a[sortKey] || "", vb = b[sortKey] || "";
    if (Array.isArray(va)) va = va.join(",");
    if (Array.isArray(vb)) vb = vb.join(",");
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDesc ? -cmp : cmp;
  });

  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");
  const stats = document.getElementById("stats");

  stats.textContent = `共 ${filtered.length} 条`;
  if (filtered.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = filtered.map(r => {
    const typeLabel = TYPE_LABELS[r.type] || r.type;
    const isExpanded = expandedPath === r.path;
    return `
      <tr class="${isExpanded ? 'expanded' : ''}" data-path="${escapeHtml(r.path)}">
        <td>${r.date || "—"}</td>
        <td><span class="type-tag">${typeLabel}</span></td>
        <td>${r.project || "—"}</td>
        <td class="title-cell" onclick="toggleDetail('${escapeHtml(r.path)}')">${escapeHtml(r.title)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${tagPills(r.tags)}</td>
      </tr>
      <tr class="detail-row ${isExpanded ? 'show' : ''}" data-detail="${escapeHtml(r.path)}">
        <td colspan="6" class="detail-cell">
          <div class="detail-content">${renderMarkdown(r.body)}</div>
        </td>
      </tr>`;
  }).join("");
}

function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderMarkdown(text) {
  if (!text) return "";
  let html = escapeHtml(text);
  // headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // tables
  html = html.replace(/^\|(.+)\|$/gm, (line) => {
    const cells = line.split("|").filter(c => c.trim()).map(c => {
      c = c.trim();
      if (/^[-:]+$/.test(c)) return null;
      return c;
    });
    if (cells.every(c => c === null)) return "";
    const isHeader = line.includes("---");
    const tag = isHeader ? "" : (cells.some(c => c === null) ? "" : "");
    return line;  // keep as-is, simple approach
  });
  // lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // paragraphs
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p><\/p>/g, '');
  return html;
}

function toggleDetail(path) {
  if (expandedPath === path) {
    expandedPath = null;
  } else {
    expandedPath = path;
  }
  render();
}

function sortBy(key) {
  if (sortKey === key) {
    sortDesc = !sortDesc;
  } else {
    sortKey = key;
    sortDesc = key === "date" ? true : false;
  }
  document.querySelectorAll("th .arrow").forEach(a => a.textContent = "");
  const th = document.querySelector(`th[data-sort="${key}"] .arrow`);
  if (th) th.textContent = sortDesc ? "▼" : "▲";
  render();
}

document.querySelectorAll("th[data-sort]").forEach(th => {
  th.addEventListener("click", () => sortBy(th.dataset.sort));
});

document.getElementById("filterType").addEventListener("change", render);
document.getElementById("filterProject").addEventListener("change", render);
document.getElementById("filterStatus").addEventListener("change", render);
document.getElementById("searchInput").addEventListener("input", render);

populateFilters();
// default sort indicator
document.querySelector('th[data-sort="date"] .arrow').textContent = "▼";
render();
</script>
</body>
</html>
